version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: specd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "specd_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  # Must match the filename update.go::fetchChecksums and install.sh expect.
  name_template: SHA256SUMS
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: 0xkhdr
    name: specd
  name_template: "{{.Tag}}"
