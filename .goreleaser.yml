version: 2

project_name: specd

before:
  hooks:
    - go mod tidy

builds:
  - id: specd
    main: .
    binary: specd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
    flags:
      - -trimpath
    # Pin embedded timestamps to the commit time => byte-reproducible archives
    # (SPEC-03 T-03-05).
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X github.com/0xkhdr/specd/internal/version.Version={{.Version}}
      - -X github.com/0xkhdr/specd/internal/version.Commit={{.Commit}}
      - -X github.com/0xkhdr/specd/internal/version.Date={{.Date}}

archives:
  - id: specd
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Supply-chain transparency: emit a Syft SBOM per archive. release.yml installs
# Syft for this (SPEC-03 T-03-05).
sboms:
  - artifacts: archive
