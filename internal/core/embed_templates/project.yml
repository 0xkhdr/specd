# specd project configuration — operator-owned, not a managed region.
# `specd init` writes this once and never clobbers your edits. Every knob below
# is documented; only verify.timeout_seconds is active by default. Syntax is a
# strict subset of YAML: two-space indent, `key: value`, `#` comments.

# Bound each task verify command in wall-clock seconds. A timeout is recorded as
# a FAILING evidence record (exit 124), never a silent hang. 0 means unbounded.
verify:
  timeout_seconds: 600

# Opt-in gates — uncomment to enable.

# Lifecycle strictness profile (spec 01 R7). default|production.
#   default    — every completeness gate below stays opt-in (backward compatible).
#   production — arms the criterion, review, and integration/negative-path
#                evidence gates together, regardless of the switches below.
# profile: default

# gates:
#   verify: error          # error|warn|off — severity when a verify record fails.

# escalation:
#   max_verify_fails: 3    # consecutive verify failures that block a task (0 disables).

# orchestration:
#   enabled: false         # required true before `specd brain` will start.
#   model: ""

# Provider-neutral routing. Core chooses capability class only; adapters map it
# to provider/model. Zero limits are unbounded. Unknown telemetry is allowed by
# default for compatibility; production policy should set it false.
# routing:
#   version: 1
#   classes: default
#   default_class: default
#   fallback: default
#   class_capabilities: default=context
#   max_tokens: 0
#   max_cost_micros: 0
#   deadline_seconds: 0
#   max_retries: 3
#   allow_unknown_telemetry: true

# security:
#   profile: prototype     # prototype|production; production makes security mandatory.
#   secrets: error         # off|warn|error per scanner.
#   injection: warn
#   slopsquat: warn
#   clean_worktree: off
#   sandbox: off

# Closed delivery policy per environment (spec 08 R7). Each environment name is
# a closed set member (development|staging|production); an unknown name or a
# missing/invalid required field fails closed at load. One line per environment,
# fields joined by `;`, health criteria joined by `+`. window/freshness are Go
# durations. production additionally requires an explicit adapter/authority,
# artifact identity, fresh observation, and rollback target at the delivery gate.
# environments:
#   staging: strategy=rolling;criteria=health;window=5m;freshness=2m;rollback=previous
#   production: strategy=canary;approver=release-manager;authority=oncall;criteria=health+latency;window=10m;freshness=5m;rollback=previous

# criteria:
#   required: false        # block completion until each acceptance criterion has evidence.

# review:
#   required: false        # block completion until review_report.md approves at HEAD.
