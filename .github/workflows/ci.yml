name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Force all JavaScript actions onto the Node 24 runtime. Node 20 is deprecated
# on GitHub-hosted runners and forced off by default starting 2026-06-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: gofmt (fail on unformatted)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::these files are not gofmt-clean:"; echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: shellcheck
        # Pinned (R4.2): no floating @master. Dependabot bumps this ref.
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts

  analyze:
    name: Static analysis & vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      # staticcheck (and friends) via golangci-lint, governed by .golangci.yml.
      - name: staticcheck (golangci-lint)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.1.6

      # Fail the build on known vulnerabilities in our deps/stdlib usage.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  test:
    name: Test (${{ matrix.os }}, go ${{ matrix.go }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Declared minimum (go.mod) + the current stable toolchain.
        go: ["1.22", "stable"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: go test -race (with coverage)
        run: go test ./... -race -count=1 -coverprofile=coverage.out

      # F4: a second run catches order/iteration-order dependence in goldens.
      - name: go test -count=2 (order-dependence)
        run: go test ./... -count=2

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == 'stable'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
        continue-on-error: true

  coverage-floor:
    name: Coverage floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Enforce coverage floor
        run: ./scripts/coverage-check.sh

  stress:
    name: Concurrency stress (cross-process)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cross-process contention on one spec
        run: ./scripts/stress.sh

  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      # F3: Windows builds to guard cross-platform compilation. `specd update`
      # self-replacement is known-limited on Windows (see TESTING.md); the
      # binary still builds and all non-self-update commands work.
      - name: Build binary
        run: go build -ldflags "-s -w -X main.version=ci" -o specd .
