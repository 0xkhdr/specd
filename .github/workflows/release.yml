name: Release

# PR + push checks live in ci.yml. This workflow only cuts releases on tags.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

# Force all JavaScript actions onto the Node 24 runtime. Node 20 is deprecated
# on GitHub-hosted runners and forced off by default starting 2026-06-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: false

      # Re-run the deterministic release inputs on the tagged tree even though
      # the fast and heavy workflows already validated the commit.
      - name: verify release inputs
        run: |
          go test ./... -race -count=1
          go test ./... -count=2
          ./scripts/test-lint.sh
          ./scripts/docs-lint.sh
          ./scripts/install-scripts-test.sh
          ./scripts/regress-domains.sh

      - name: installed production lifecycle smoke
        run: |
          go build -o "$RUNNER_TEMP/specd" .
          SPECD_BIN="$RUNNER_TEMP/specd" ./scripts/production-smoke.sh

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release archives
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*.tar.gz

      - name: Verify published archive attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for f in dist/*.tar.gz; do
            gh attestation verify "$f" --repo "$GITHUB_REPOSITORY"
          done

      - name: Preserve built release for install smoke
        uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: dist

  install-smoke:
    name: Install smoke (${{ matrix.os }}/${{ matrix.arch }})
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
          - runner: macos-15-intel
            os: darwin
            arch: amd64
          - runner: macos-latest
            os: darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist
      - name: Install real archive and run release smoke
        env:
          SPECD_RELEASE_DIR: dist
          SPECD_OS: ${{ matrix.os }}
          SPECD_ARCH: ${{ matrix.arch }}
          SPECD_VERSION: ${{ github.ref_name }}
          SPECD_EXPECT_COMMIT: ${{ github.sha }}
        run: |
          ./scripts/install.sh --install-dir "$RUNNER_TEMP/bin"
          ./scripts/release-smoke.sh "$RUNNER_TEMP/bin/specd"
