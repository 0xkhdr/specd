name: Upgrade matrix

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - run: go build -o specd .
      - run: ./scripts/upgrade-matrix.sh
      - run: ./scripts/upgrade-matrix.sh --crash-drill
