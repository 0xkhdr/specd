name: recurring-invariant-example

on:
  workflow_dispatch:

jobs:
  recurring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build specd
        run: go build -o specd .
      - name: Run deterministic check and record envelope
        run: |
          verdict=pass
          go test ./... || verdict=fail
          ./specd recurring record example --check full-suite --head "$GITHUB_SHA" --release manual --config ci --verdict "$verdict" --observed-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          test "$verdict" = pass
