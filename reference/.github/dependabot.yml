version: 2
updates:
  # Keep pinned GitHub Actions current (R4.2): Dependabot opens PRs bumping the
  # action refs used across the workflows so pins don't silently rot.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Track Go module updates. The runtime is stdlib-only, so this mostly covers
  # the toolchain directive and any future dev/test modules.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
