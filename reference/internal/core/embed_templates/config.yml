# specd configuration (YAML v2)
# Machine runtime state remains JSON; this file is for human-authored policy.
version: 1
defaults:
  verify_command: "echo 'specd: defaultVerify is unset — set it to your repo test command (see the specd-steering skill)' >&2; exit 1"
  report_format: "md"
  subagent_mode: "inline"
  promotion_threshold: 3
report:
  format: "md"
  auto_refresh_seconds: 0
roles:
  subagent_mode: "inline"
gates:
  traceability: "warn"
  acceptance: "off"
  scope: "off"
  context_budget: "off"
  max_context_tokens: 0
  mode_capability: ""
  custom: []
verify:
  sandbox: "none"
orchestration:
  enabled: false
  approval_policy: "manual"
  worker_mode: "host"
  max_workers: 4
  max_retries: 2
  session_timeout_minutes: 120
  host_reported_cost_limit_usd: 0
  transport:
    kind: "file"
    poll_interval_millis: 500
    message_ttl_seconds: 3600
    lease_seconds: 120
    heartbeat_seconds: 30
  program:
    max_concurrent_specs: 2
