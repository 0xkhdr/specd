# golangci-lint configuration (v2 schema). Governs the static-analysis gate in
# CI. staticcheck is the headline analyzer required by the regression spec
# (R4.1); the rest are cheap, high-signal checks already implied by `go vet`.
#
# These run as CI-only dev tooling — they add no runtime dependency to the
# shipped binary (stdlib-only invariant preserved).
version: "2"

run:
  timeout: 5m

linters:
  enable:
    - staticcheck
    - errcheck
    - govet
    - ineffassign
    - unused
    - errorlint
    - gosec
    - bodyclose
    - gocritic
    - unconvert
    - misspell
  settings:
    errcheck:
      # Conventionally-ignored stdlib calls: best-effort cleanup/diagnostic writes
      # whose error adds no actionable signal. Real error paths are still checked.
      exclude-functions:
        - (io.Closer).Close
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Sscanf
        - io.WriteString
        - os.Remove
        - os.Setenv
        - os.Unsetenv
        - github.com/0xkhdr/specd/internal/core.PrintJSON
  exclusions:
    rules:
      # Test code legitimately ignores errors and feeds dynamic paths/commands to
      # the OS; gosec's taint/inclusion checks there are noise, not findings.
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      # specd is a local-first, file-based tool: reading files from paths it
      # constructs under .specd (or operator-supplied CLI paths) is its core
      # purpose, so gosec's G304 "file inclusion via variable" is a false
      # positive at every site. The security boundary is the operator's
      # filesystem, documented in SECURITY.md — not an in-process taint check.
      - linters:
          - gosec
        text: "G304"
      # G104 (unhandled error) duplicates errcheck, which is configured above
      # with a curated exclude-functions list (best-effort cleanup/diagnostic
      # writes). gosec's coarser G104 re-flags those same intentional sites, so
      # defer error handling to errcheck as the single source of truth.
      - linters:
          - gosec
        text: "G104"
      # shell_runner_test.go is build-tagged !windows, so its defensive
      # GOOS=="windows" guards are statically dead by construction.
      - path: internal/worker/shell_runner_test\.go
        text: "SA4032"
        linters:
          - staticcheck
